<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中數學互動學習網 - plaidfunction1010 專屬版</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --sidebar-width: 280px; --primary-color: #2c3e50; --accent-color: #3498db; --bg-color: #f8f9fa; --success-color: #27ae60; --error-color: #e74c3c; }
        body { font-family: 'Noto Sans TC', sans-serif; margin: 0; display: flex; height: 100vh; background-color: var(--bg-color); }
        
        #sidebar { width: var(--sidebar-width); background-color: var(--primary-color); color: white; display: flex; flex-direction: column; overflow-y: auto; }
        #sidebar h2 { padding: 20px; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); margin: 0; }
        .unit-item { padding: 15px 20px; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; }
        .unit-item:hover { background-color: rgba(255,255,255,0.1); }
        .unit-item.active { background-color: var(--accent-color); border-left: 4px solid #fff; }
        
        #main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .theme-badge { background: #e8f4fd; color: #2980b9; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; font-weight: bold; }
        
        /* 題目與選項樣式 */
        .problem-text { font-size: 1.2rem; margin-bottom: 25px; line-height: 1.8; color: #333; }
        .options-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .option-btn { padding: 15px; border: 2px solid #eee; border-radius: 8px; background: #fff; cursor: pointer; transition: all 0.2s; text-align: left; font-size: 1rem; }
        .option-btn:hover { border-color: var(--accent-color); background: #f0f7ff; }
        .option-btn.correct { background-color: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .option-btn.wrong { background-color: var(--error-color) !important; color: white; border-color: var(--error-color); }
        
        .sol-box { margin-top: 15px; padding: 15px; background: #fdfae6; border-left: 5px solid #f1c40f; display: none; border-radius: 4px; line-height: 1.7; }
        .btn-sol { background: #95a5a6; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; }
        #visitor-counter { position: fixed; bottom: 15px; left: 15px; background: rgba(0,0,0,0.8); color: white; padding: 6px 12px; border-radius: 20px; font-size: 13px; z-index: 1000; }
        
        .status-badge { float: right; font-size: 0.8rem; padding: 2px 6px; border-radius: 10px; background: #ddd; color: #666; }
        .status-done { background: var(--success-color); color: white; }
    </style>
</head>
<body>

    <div id="loading">📡 正在同步 plaidfunction1010 的雲端題庫...</div>

    <nav id="sidebar">
        <h2>數學互動學習網</h2>
        <div id="unit-list"></div>
    </nav>

    <main id="main-content">
        <div id="display-area">
            <div style="text-align:center; margin-top:100px; color: #95a5a6;">
                <h1>歡迎回來，老師！</h1>
                <p>請選擇左側單元進行練習</p>
            </div>
        </div>
    </main>

    <div id="visitor-counter">
        🚀 累積人氣：
        <img src="https://hits.dwyl.com/plaidfunction1010/math-learning-site.svg" alt="Hits" style="vertical-align: middle;">
    </div>

    <script>
        const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTA19q_bXVl7XZPAf4ImCJEWZfs_zJwFuSFsBmAf3n-_I_zrkb8cuzyxMWrUJhpBB7xpnQ9baoEDh1U/pub?output=csv'; 
        let allProblems = [];

        // 初始化：讀取資料
        function fetchSheetData() {
            Papa.parse(sheetCsvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    allProblems = results.data.slice(1).filter(row => row['單元名稱'] || row['Unit']);
                    document.getElementById('loading').style.display = 'none';
                    initSidebar();
                }
            });
        }

        function initSidebar() {
            const list = document.getElementById('unit-list');
            list.innerHTML = "";
            const units = [...new Set(allProblems.map(p => p['單元名稱'] || p['Unit']))];
            units.forEach(unit => {
                const div = document.createElement('div');
                div.className = 'unit-item';
                div.innerText = unit;
                div.onclick = () => loadUnit(unit, div);
                list.appendChild(div);
            });
        }

        // 核心邏輯：解析題目與選項
        function loadUnit(unitName, element) {
            document.querySelectorAll('.unit-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const area = document.getElementById('display-area');
            area.innerHTML = `<h1>${unitName}</h1>`;

            const problems = allProblems.filter(p => (p['單元名稱'] || p['Unit']) === unitName);
            
            problems.forEach((p, idx) => {
                const rawText = p['題目內容，可輸入 LaTeX'] || p['Text'] || '';
                // 自動切割題目與選項：尋找第一個出現 (1) 的位置
                const optionStart = rawText.search(/\(\d\)/);
                let questionBody = rawText;
                let optionsArray = [];

                if (optionStart !== -1) {
                    questionBody = rawText.substring(0, optionStart);
                    const optionsPart = rawText.substring(optionStart);
                    // 使用正則表達式切分 (1), (2), (3)...
                    optionsArray = optionsPart.split(/\s*(?=\(\d\))/).filter(s => s.trim() !== "");
                }

                const card = document.createElement('div');
                card.className = 'card';
                const isDone = localStorage.getItem(`done-${unitName}-${idx}`);

                card.innerHTML = `
                    <div class="theme-badge">${p['主題'] || '例題'}</div>
                    ${isDone ? '<span class="status-badge status-done">已完成</span>' : '<span class="status-badge">未練習</span>'}
                    <div class="problem-text">${questionBody}</div>
                    
                    <div class="options-container" id="opts-${idx}">
                        ${optionsArray.map((opt, oIdx) => {
                            // 提取數字作為答案判定
                            const optNum = opt.match(/\((\d)\)/)[1];
                            return `<button class="option-btn" onclick="checkChoice(this, '${optNum}', '${p['答案'] || p['Answer']}', '${unitName}', ${idx})">${opt}</button>`;
                        }).join('')}
                    </div>

                    <button class="btn-sol" onclick="toggleSol(${idx})">詳細解答</button>
                    <div id="sol-${idx}" class="sol-box">
                        <strong>解題步驟：</strong><br>${p['詳細解答'] || '暫無解析'}
                    </div>
                `;
                area.appendChild(card);
            });

            renderMathInElement(area, {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "$", right: "$", display: false},
                    {left: "\\(", right: "\\)", display: false}
                ],
                throwOnError: false
            });
        }

        function checkChoice(btn, chosen, correct, unit, idx) {
            // 處理答案格式，統一轉為純數字字串
            const cleanCorrect = correct.replace(/[^0-9]/g, '');
            const cleanChosen = chosen.replace(/[^0-9]/g, '');

            if (cleanChosen === cleanCorrect) {
                btn.classList.add('correct');
                localStorage.setItem(`done-${unit}-${idx}`, 'true');
                // 更新狀態標籤
                btn.closest('.card').querySelector('.status-badge').className = 'status-badge status-done';
                btn.closest('.card').querySelector('.status-badge').innerText = '已完成';
            } else {
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function toggleSol(idx) {
            const sol = document.getElementById(`sol-${idx}`);
            sol.style.display = (sol.style.display === 'block') ? 'none' : 'block';
        }

        window.onload = fetchSheetData;
    </script>
</body>
</html>
