<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plaidfunction1010 | 數學互動學習戰情室</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root { 
            --sidebar-width: 300px; 
            --primary-gradient: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            --accent-color: #3498db; 
            --bg-color: #f0f2f5; 
            --card-shadow: 0 8px 30px rgba(0,0,0,0.05);
            --success-color: #27ae60;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background-color: var(--bg-color);
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #sidebar { 
            width: var(--sidebar-width); 
            background: var(--primary-gradient); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }

        #sidebar h2 { padding: 40px 20px; font-size: 1.4rem; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.1); margin: 0; text-align: center; }

        .unit-list-container { flex-grow: 1; overflow-y: auto; padding: 20px 0; }
        .unit-item { padding: 18px 25px; cursor: pointer; transition: 0.2s; border-left: 5px solid transparent; font-weight: 500; color: #bdc3c7; }
        .unit-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .unit-item.active { background: rgba(52, 152, 219, 0.15); border-left: 5px solid var(--accent-color); color: white; }

        #main-content { flex-grow: 1; padding: 50px; overflow-y: auto; scroll-behavior: smooth; }
        
        .card { 
            background: white; 
            padding: 35px; 
            border-radius: 20px; 
            box-shadow: var(--card-shadow); 
            margin-bottom: 40px; 
            border: 1px solid rgba(0,0,0,0.02);
            transition: transform 0.3s;
        }

        .theme-badge { background: #ebf5ff; color: #007bff; padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; margin-bottom: 20px; display: inline-block; }
        
        .problem-img { width: 100%; max-height: 450px; object-fit: contain; border-radius: 12px; margin-bottom: 25px; border: 1px solid #f0f0f0; background: #fff; }

        .problem-text { font-size: 1.25rem; line-height: 1.9; color: #2d3436; margin-bottom: 30px; }
        
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .opt-card { 
            padding: 18px; 
            border: 2px solid #f1f3f5; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.2s; 
            font-size: 1.05rem;
            background: #fff;
        }
        .opt-card:hover { border-color: var(--accent-color); background: #f8fbff; }
        .opt-card.correct { background: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .opt-card.wrong { background: #ff7675 !important; color: white; border-color: #d63031; }

        .btn-sol-toggle { background: #f8f9fa; color: #636e72; padding: 12px; border-radius: 10px; border: 1px solid #e9ecef; cursor: pointer; width: 100%; font-weight: 700; transition: 0.2s; }
        
        .sol-content { margin-top: 20px; padding: 25px; background: #fffde7; border-radius: 12px; border-left: 6px solid #f1c40f; display: none; line-height: 1.8; }

        #visitor-counter { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 8px 15px; border-radius: 30px; color: white; font-size: 12px; z-index: 2000; }
    </style>
</head>
<body oncontextmenu="return false;">

    <nav id="sidebar">
        <h2>Plaid Math</h2>
        <div class="unit-list-container" id="unit-list"></div>
    </nav>

    <main id="main-content">
        <div id="display-area">
            <div style="text-align:center; margin-top:150px; opacity:0.3;">
                <h1 style="font-size:3rem;">MASTER MATHEMATICS</h1>
                <p>請選擇單元開啟你的學習旅程</p>
            </div>
        </div>
    </main>

    <div id="visitor-counter">
        🚀 戰情室人氣：
        <img src="https://hits.dwyl.com/plaidfunction1010/runningmath.svg" alt="Hits" style="vertical-align: middle;">
    </div>

    <script>
        // 已更換為你的專案連結：runningmath
        const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTA19q_bXVl7XZPAf4ImCJEWZfs_zJwFuSFsBmAf3n-_I_zrkb8cuzyxMWrUJhpBB7xpnQ9baoEDh1U/pub?output=csv'; 
        let allData = [];

        function init() {
            Papa.parse(sheetCsvUrl, {
                download: true, header: true,
                complete: function(results) {
                    allData = results.data.slice(1).filter(r => r['單元名稱'] || r['Unit']);
                    renderSidebar();
                }
            });
        }

        function renderSidebar() {
            const container = document.getElementById('unit-list');
            const units = [...new Set(allData.map(d => d['單元名稱'] || d['Unit']))];
            container.innerHTML = units.map(u => `<div class="unit-item" onclick="loadUnit('${u}', this)">${u}</div>`).join('');
        }

        function loadUnit(unitName, el) {
            document.querySelectorAll('.unit-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            const area = document.getElementById('display-area');
            const problems = allData.filter(d => (d['單元名稱'] || d['Unit']) === unitName);
            
            area.innerHTML = `<h1 style="margin-bottom:40px; color:#2c3e50; border-bottom:2px solid #eee; padding-bottom:10px;">${unitName}</h1>`;
            
            problems.forEach((p, idx) => {
                const raw = p['題目內容，可輸入 LaTeX'] || p['Text'] || '';
                const img = p['圖片網址'] || p['ImageURL'] || '';
                const qBody = raw.split(/\(\d\)/)[0];
                const opts = raw.match(/\(\d\)[^(]*/g) || [];

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="theme-badge">${p['主題'] || '核心例題'}</div>
                    ${img ? `<img src="${img}" class="problem-img">` : ''}
                    <div class="problem-text">${qBody}</div>
                    <div class="options-grid">
                        ${opts.map(o => {
                            const n = o.match(/\((\d)\)/)[1];
                            return `<div class="opt-card" onclick="check('${n}', '${p['答案'] || p['Answer']}', this)">${o}</div>`;
                        }).join('')}
                    </div>
                    <button class="btn-sol-toggle" onclick="toggleSol('${unitName}-${idx}')">查看詳細解析</button>
                    <div id="sol-${unitName}-${idx}" class="sol-content"><strong>【專家解析】</strong><br><br>${p['詳細解答'] || '請洽授課老師'}</div>
                `;
                area.appendChild(card);
            });

            renderMathInElement(area, {
                delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}, {left: "\\(", right: "\\)", display: false}],
                throwOnError: false
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function check(chosen, correct, btn) {
            const ans = correct.replace(/[^0-9]/g, '');
            if(chosen === ans) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function toggleSol(id) {
            const s = document.getElementById(`sol-${id}`);
            s.style.display = (s.style.display === 'block') ? 'none' : 'block';
        }

        init();
    </script>
</body>
</html>
