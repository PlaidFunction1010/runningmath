<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中數學互動學習網 - plaidfunction1010 專業版</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --sidebar-width: 280px; --primary-color: #2c3e50; --accent-color: #3498db; --bg-color: #f8f9fa; --success-color: #27ae60; --error-color: #e74c3c; }
        body { font-family: 'Noto Sans TC', sans-serif; margin: 0; display: flex; height: 100vh; background-color: var(--bg-color); }
        
        /* 側邊欄優化 */
        #sidebar { width: var(--sidebar-width); background-color: var(--primary-color); color: white; display: flex; flex-direction: column; overflow-y: auto; }
        #sidebar h2 { padding: 20px; font-size: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); margin: 0; }
        
        .progress-container { padding: 15px 20px; background: rgba(0,0,0,0.2); font-size: 0.85rem; }
        .progress-bar-bg { background: #444; height: 8px; border-radius: 4px; margin-top: 5px; }
        .progress-bar-fill { background: var(--success-color); height: 100%; border-radius: 4px; width: 0%; transition: 0.5s; }

        .unit-item { padding: 15px 20px; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; display: flex; justify-content: space-between; align-items: center; }
        .unit-item:hover { background-color: rgba(255,255,255,0.1); }
        .unit-item.active { background-color: var(--accent-color); border-left: 4px solid #fff; }
        
        #main-content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #eee; }
        .theme-badge { background: #e8f4fd; color: #2980b9; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 15px; display: inline-block; font-weight: bold; }
        
        .problem-text { font-size: 1.2rem; margin-bottom: 25px; line-height: 1.8; color: #333; }
        .options-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .option-btn { padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; transition: 0.2s; text-align: left; }
        .option-btn:hover { border-color: var(--accent-color); background: #f9fcff; }
        .option-btn.correct { background-color: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .option-btn.wrong { background-color: var(--error-color) !important; color: white; border-color: var(--error-color); }
        
        .btn-sol { background: #f1f3f5; color: #495057; padding: 10px 20px; border: 1px solid #dee2e6; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .sol-box { margin-top: 15px; padding: 15px; background: #fff9db; border-left: 5px solid #fcc419; display: none; border-radius: 4px; }
        
        #visitor-counter { position: fixed; bottom: 15px; left: 15px; background: rgba(0,0,0,0.8); color: white; padding: 6px 12px; border-radius: 20px; font-size: 13px; z-index: 1000; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <h2>數學互動學習網</h2>
        <div class="progress-container">
            全書完成率：<span id="total-progress-text">0%</span>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="total-progress-bar"></div></div>
        </div>
        <div id="unit-list"></div>
    </nav>

    <main id="main-content">
        <div id="display-area">
            <div style="text-align:center; margin-top:100px; color: #adb5bd;">
                <h1>plaidfunction1010 教學戰情室</h1>
                <p>專業、互動、數據化的數學練習平台</p>
            </div>
        </div>
    </main>

    <div id="visitor-counter">
        🚀 累積人氣：
        <img src="https://hits.dwyl.com/plaidfunction1010/math-learning-site.svg" alt="Hits" style="vertical-align: middle;">
    </div>

    <script>
        const sheetCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTA19q_bXVl7XZPAf4ImCJEWZfs_zJwFuSFsBmAf3n-_I_zrkb8cuzyxMWrUJhpBB7xpnQ9baoEDh1U/pub?output=csv'; 
        let allProblems = [];

        function fetchSheetData() {
            Papa.parse(sheetCsvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    allProblems = results.data.slice(1).filter(row => row['單元名稱'] || row['Unit']);
                    initSidebar();
                    updateGlobalProgress();
                }
            });
        }

        function initSidebar() {
            const list = document.getElementById('unit-list');
            list.innerHTML = "";
            const units = [...new Set(allProblems.map(p => p['單元名稱'] || p['Unit']))];
            units.forEach(unit => {
                const div = document.createElement('div');
                div.className = 'unit-item';
                div.innerHTML = `<span>${unit}</span>`;
                div.onclick = () => loadUnit(unit, div);
                list.appendChild(div);
            });
        }

        function updateGlobalProgress() {
            const total = allProblems.length;
            if (total === 0) return;
            let done = 0;
            allProblems.forEach((p, idx) => {
                if(localStorage.getItem(`done-${p['單元名稱'] || p['Unit']}-${idx}`)) done++;
            });
            const percent = Math.round((done / total) * 100);
            document.getElementById('total-progress-bar').style.width = percent + '%';
            document.getElementById('total-progress-text').innerText = percent + '%';
        }

        function loadUnit(unitName, element) {
            document.querySelectorAll('.unit-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const area = document.getElementById('display-area');
            area.innerHTML = `<h1>${unitName}</h1>`;

            const problems = allProblems.filter(p => (p['單元名稱'] || p['Unit']) === unitName);
            
            problems.forEach((p, idx) => {
                const rawText = p['題目內容，可輸入 LaTeX'] || p['Text'] || '';
                const imgUrl = p['圖片網址'] || p['ImageURL'] || '';
                const imgHtml = imgUrl ? `<img src="${imgUrl}" style="max-width:100%; height:auto; border-radius:8px; margin-bottom:20px; display:block; border:1px solid #eee;">` : '';
                
                const optionStart = rawText.search(/\(\d\)/);
                let questionBody = rawText;
                let optionsArray = [];

                if (optionStart !== -1) {
                    questionBody = rawText.substring(0, optionStart);
                    optionsArray = rawText.substring(optionStart).split(/\s*(?=\(\d\))/).filter(s => s.trim() !== "");
                }

                const card = document.createElement('div');
                card.className = 'card';
                const isDone = localStorage.getItem(`done-${unitName}-${idx}`);

                card.innerHTML = `
                    <div class="theme-badge">${p['主題'] || '核心概念'}</div>
                    ${imgHtml}
                    <div class="problem-text">${questionBody}</div>
                    <div class="options-container">
                        ${optionsArray.map(opt => {
                            const optNum = opt.match(/\((\d)\)/)[1];
                            return `<button class="option-btn" onclick="checkChoice(this, '${optNum}', '${p['答案'] || p['Answer']}', '${unitName}', ${idx})">${opt}</button>`;
                        }).join('')}
                    </div>
                    <button class="btn-sol" onclick="toggleSol('${unitName}-${idx}')">查看詳細解答</button>
                    <div id="sol-${unitName}-${idx}" class="sol-box"><strong>解析：</strong><br>${p['詳細解答'] || '請聯絡老師獲取解析'}</div>
                `;
                area.appendChild(card);
            });

            renderMathInElement(area, {
                delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}, {left: "\\(", right: "\\)", display: false}],
                throwOnError: false
            });
        }

        function checkChoice(btn, chosen, correct, unit, idx) {
            const cleanCorrect = correct.replace(/[^0-9]/g, '');
            if (chosen === cleanCorrect) {
                btn.classList.add('correct');
                localStorage.setItem(`done-${unit}-${idx}`, 'true');
                updateGlobalProgress();
            } else {
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function toggleSol(id) {
            const sol = document.getElementById(`sol-${id}`);
            sol.style.display = (sol.style.display === 'block') ? 'none' : 'block';
        }

        window.onload = fetchSheetData;
    </script>
</body>
</html>
